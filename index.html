<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/style.css" />
  <title>Kimetsu no Yaiba — Personagens</title>
  <script src="main.js" defer></script>
</head>

<body>

  <div class="header">
    <h1>Kimetsu no Yaiba - Personagens</h1>
    <p>Digite para buscar entre os personagens</p>
  </div>

  <div class="busca">
    <input type="text" id="barra-pesquisa" placeholder='Ex: "Tanjirou", "Zenitsu" ou "Kamado"' />
  </div>

  <div class="estatisticas">
    <div class="card">
      <div class="texto-card">Total de personagens</div>
      <div class="valor" id="total">—</div>
    </div>
    <div class="card">
      <div class="texto-card">Elenco principal</div>
      <div class="valor" id="principal">—</div>
    </div>
    <div class="card">
      <div class="texto-card">Coadjuvantes</div>
      <div class="valor" id="coadjuvante">—</div>
    </div>
  </div>

  <div id="resultado">
    <div class="results-title">Exemplo de personagem</div>

    <div class="container-resultado">
      <div class="cards-principais" id="card-modelo">
        <img class="card-img" src="./imagem-teste.jpg" alt="Tanjirou Kamado" />

        <div class="personagem">
          <div class="nome-personagem">Tanjirou Kamado</div>
          <span class="classificacao">Principal</span>
        </div>
      </div>
    </div>
  </div>

  <footer>
    © 2026 Kauan Alves. Todos os direitos reservados.
  </footer>

</body>

</html>
